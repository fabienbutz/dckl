name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  check:
    name: lint + typecheck + test + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.24.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      # Build first so cross-package type imports (e.g. @dckl/cli -> @dckl/core)
      # resolve against generated .d.ts; then typecheck and test.
      - run: pnpm -r build
      - run: pnpm -r typecheck
      - run: pnpm -r test
